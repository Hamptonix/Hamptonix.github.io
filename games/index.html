<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamptonix | Games</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/R0Pj0sp7/channels4-profile-removebg-preview-(2).png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <script src="/games/games.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a;
      --white: #f0f0f0;
      --gray: #141414;
      --border: #242424;
      --accent: #7ecfea;
      --accent-glow: rgba(126, 207, 234, 0.15);
    }
    html, body {
      width: 100%; min-height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
    }
    body { overflow-x: hidden; overflow-y: auto; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(126,207,234,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(126,207,234,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    .corner { position: fixed; width: 26px; height: 26px; }
    .corner.tl { top:14px; left:14px; border-top:1px solid rgba(126,207,234,0.4); border-left:1px solid rgba(126,207,234,0.4); }
    .corner.tr { top:14px; right:14px; border-top:1px solid rgba(126,207,234,0.4); border-right:1px solid rgba(126,207,234,0.4); }
    .corner.bl { bottom:14px; left:14px; border-bottom:1px solid rgba(126,207,234,0.4); border-left:1px solid rgba(126,207,234,0.4); }
    .corner.br { bottom:14px; right:14px; border-bottom:1px solid rgba(126,207,234,0.4); border-right:1px solid rgba(126,207,234,0.4); }
    @media (max-width: 360px) { .corner { display: none; } }

    .scene {
      position: relative; z-index: 1;
      width: 100%; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 16px 60px;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(240,240,240,0.4); text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }

    .header { text-align: center; margin-bottom: 8px; animation: fadeDown 0.55s cubic-bezier(0.22,1,0.36,1) both; }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 3.4rem);
      letter-spacing: 0.22em; color: var(--white);
      text-shadow: 0 0 40px rgba(126,207,234,0.2);
    }
    .header-sub {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.3em;
      color: var(--accent); opacity: 0.65; margin-top: 2px;
    }
    .header-line {
      width: 50px; height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 7px auto 0;
    }

    .search-wrap {
      width: 100%; max-width: 620px;
      margin-top: 24px; margin-bottom: 20px;
      animation: fadeDown 0.6s cubic-bezier(0.22,1,0.36,1) 0.05s both;
    }
    .search-box {
      display: flex; align-items: center; gap: 10px;
      background: var(--gray);
      border: 1px solid var(--border);
      border-radius: 3px; padding: 10px 14px;
      box-shadow: 0 0 0 1px rgba(126,207,234,0.06);
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .search-box:focus-within {
      border-color: rgba(126,207,234,0.35);
      box-shadow: 0 0 0 1px rgba(126,207,234,0.15), 0 0 18px var(--accent-glow);
    }
    .search-icon { width: 13px; height: 13px; flex-shrink: 0; opacity: 0.4; }
    #search {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--white); font-family: 'Space Mono', monospace;
      font-size: 0.72rem; letter-spacing: 0.08em; caret-color: var(--accent);
    }
    #search::placeholder { color: rgba(240,240,240,0.25); letter-spacing: 0.08em; }
    .search-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.2em;
      color: var(--accent); opacity: 0.55; white-space: nowrap;
    }

    .filters {
      width: 100%; max-width: 620px;
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 22px;
      animation: fadeDown 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    }
    .filter-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.2em;
      padding: 5px 11px; background: transparent;
      border: 1px solid var(--border); border-radius: 2px;
      color: rgba(240,240,240,0.45); cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .filter-btn:hover { color: var(--accent); border-color: rgba(126,207,234,0.25); }
    .filter-btn.active {
      background: rgba(126,207,234,0.1);
      border-color: rgba(126,207,234,0.4);
      color: var(--accent);
    }

    .grid {
      width: 100%; max-width: 620px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      animation: fadeUp 0.65s cubic-bezier(0.22,1,0.36,1) 0.12s both;
    }
    @media (max-width: 539px) { .grid { grid-template-columns: 1fr; } }

    .game-card {
      background: var(--gray);
      border: 1px solid var(--border);
      border-radius: 3px; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 0 0 1px rgba(126,207,234,0.06), 0 8px 28px rgba(0,0,0,0.6);
      transition: box-shadow 0.25s, transform 0.25s, border-color 0.25s;
      min-width: 0; width: 100%;
    }
    .game-card:hover {
      box-shadow: 0 0 0 1px rgba(126,207,234,0.2), 0 12px 40px rgba(0,0,0,0.7), 0 0 20px var(--accent-glow);
      transform: translateY(-2px);
      border-color: rgba(126,207,234,0.2);
    }

    .game-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 12px 10px;
      border-bottom: 1px solid var(--border);
    }
    .game-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 6px; object-fit: cover;
      border: 1px solid rgba(126,207,234,0.15);
      background: rgba(255,255,255,0.04);
    }
    .game-icon-placeholder {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 6px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: center;
    }
    .game-title-wrap { flex: 1; min-width: 0; }
    .game-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 0.14em; color: var(--white);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .game-tag {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.6rem; letter-spacing: 0.22em;
      color: var(--accent); opacity: 0.65; margin-top: 1px;
    }
    .game-desc {
      padding: 9px 12px 10px;
      font-size: 0.6rem; line-height: 1.65; letter-spacing: 0.04em;
      color: rgba(240,240,240,0.5); flex: 1;
    }
    .game-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 9px 12px; background: transparent;
      border-top: 1px solid var(--border);
      border-bottom: none; border-left: none; border-right: none;
      color: var(--accent); font-family: 'Space Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.12em;
      text-transform: uppercase; text-decoration: none; cursor: pointer;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s;
      width: 100%; min-height: 38px;
    }
    .game-btn:hover {
      background: var(--accent); color: var(--black);
      box-shadow: 0 0 18px rgba(126,207,234,0.3);
    }

    .empty {
      grid-column: 1 / -1; text-align: center;
      padding: 48px 16px; color: rgba(240,240,240,0.2);
    }
    .empty-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem; letter-spacing: 0.22em; margin-top: 10px;
    }

    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-14px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="scene">

  <a class="back-link" href="https://hamptonix.com">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    hamptonix.com
  </a>

  <div class="header">
    <h1>games</h1>
    <div class="header-sub">catalog</div>
    <div class="header-line"></div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="text" placeholder="Search games..." autocomplete="off" spellcheck="false" />
      <span class="search-count" id="count"></span>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>

</div>

<script>
  const games = typeof GAMES !== "undefined" ? GAMES : [];

  if (!games.length) {
    document.getElementById("grid").innerHTML =
      '<div class="empty"><div style="font-size:1.6rem">◌</div><div class="empty-text">No games.js file found</div></div>';
  }

  const categories = ["All", ...new Set(games.map(g => g.category).filter(Boolean))];
  let activeFilter = "All";
  let query = "";

  const filtersEl = document.getElementById("filters");
  const gridEl    = document.getElementById("grid");
  const countEl   = document.getElementById("count");
  const searchEl  = document.getElementById("search");

  function renderFilters() {
    filtersEl.innerHTML = "";
    categories.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (c === activeFilter ? " active" : "");
      btn.textContent = c;
      btn.onclick = () => { activeFilter = c; renderFilters(); renderGrid(); };
      filtersEl.appendChild(btn);
    });
  }

  function buildIcon(g) {
    if (g.icon && g.icon.includes("simpleicons.org")) {
      return `<div class="game-icon-placeholder"><img src="${g.icon}" style="width:18px;height:18px;opacity:0.5;" /></div>`;
    }
    if (g.icon) {
      return `<img class="game-icon" src="${g.icon}" onerror="this.outerHTML='<div class=\\'game-icon-placeholder\\'></div>'" />`;
    }
    return `<div class="game-icon-placeholder"></div>`;
  }

  function renderGrid() {
    const q = query.toLowerCase();
    const filtered = games.filter(g => {
      const matchSearch = !q ||
        (g.title  || "").toLowerCase().includes(q) ||
        (g.desc   || "").toLowerCase().includes(q) ||
        (g.tag    || "").toLowerCase().includes(q);
      const matchFilter = activeFilter === "All" || g.category === activeFilter;
      return matchSearch && matchFilter;
    });

    countEl.textContent = filtered.length + " GAMES";
    gridEl.innerHTML = "";

    if (!filtered.length) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.innerHTML = '<div style="font-size:1.6rem">◌</div><div class="empty-text">No games found</div>';
      gridEl.appendChild(empty);
      return;
    }

    filtered.forEach(g => {
      const card = document.createElement("div");
      card.className = "game-card";
      card.innerHTML = `
        <div class="game-header">
          ${buildIcon(g)}
          <div class="game-title-wrap">
            <div class="game-title">${g.title || "Untitled"}</div>
            <div class="game-tag">${g.tag || ""}</div>
          </div>
        </div>
        <div class="game-desc">${g.desc || ""}</div>
        <a class="game-btn" href="${g.url || "#"}" target="_blank">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Play
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:auto;opacity:0.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      `;
      gridEl.appendChild(card);
    });
  }

  searchEl.addEventListener("input", e => { query = e.target.value; renderGrid(); });
  renderFilters();
  renderGrid();
</script>
</body>
</html>
