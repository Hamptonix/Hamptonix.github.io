<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamptonix | Games</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/R0Pj0sp7/channels4-profile-removebg-preview-(2).png" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="/games/games.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #3d8b37;
      --accent-lt:   #52b84a;
      --accent-pale: #d4edcf;
      --accent-mid:  #8ec988;
      --blue:        #1d6fb8;
      --blue-pale:   #dbeafe;
      --text:        #111;
      --text-2:      #333;
      --text-3:      #555;
      --border:      #d0d8cd;
      --surface:     #f0f3ef;
      --card-head:   #dde5da;
      --bg:          #e4ebe1;
      --radius:      14px;
      --radius-sm:   9px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── PAGE WRAPPER ── */
    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 28px 72px;
    }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.95rem; font-weight: 600;
      color: var(--text-3); text-decoration: none;
      margin-bottom: 28px;
      transition: color 0.12s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 14px; height: 14px; }

    /* ── PAGE HEADER ── */
    .page-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 28px;
      animation: fadeDown 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }
    .page-header-logo {
      width: 48px; height: 48px;
      border-radius: 10px; object-fit: cover;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
    }
    .page-header-text h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800; color: var(--text);
      letter-spacing: -0.02em; line-height: 1.1;
    }
    .page-header-text p {
      font-size: 1.05rem; color: var(--text-3); margin-top: 4px;
    }

    /* ── SEARCH + FILTER CARD ── */
    .controls-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
      animation: fadeDown 0.5s cubic-bezier(0.22,1,0.36,1) 0.05s both;
    }
    .controls-head {
      background: var(--card-head);
      border-bottom: 1.5px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
      flex-wrap: wrap;
    }
    .controls-head h2 {
      font-size: 1.05rem; font-weight: 700; color: var(--text);
    }
    .count-badge {
      font-size: 0.78rem; font-weight: 700;
      color: var(--accent); background: var(--accent-pale);
      border: 1.5px solid var(--accent-mid);
      padding: 3px 11px; border-radius: 99px;
    }
    .controls-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

    .search-box {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-box:focus-within {
      border-color: var(--accent-mid);
      box-shadow: 0 0 0 3px rgba(61,139,55,0.08);
    }
    .search-icon { width: 15px; height: 15px; flex-shrink: 0; color: var(--text-3); }
    #search {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem; color: var(--text);
      caret-color: var(--accent);
    }
    #search::placeholder { color: var(--text-3); }

    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 0.92rem; font-weight: 600;
      padding: 6px 16px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      color: var(--text-3);
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .filter-btn:hover { background: var(--accent-pale); color: var(--accent); border-color: var(--accent-mid); }
    .filter-btn.active {
      background: var(--accent-pale);
      color: var(--accent);
      border-color: var(--accent-mid);
    }

    /* ── GAMES GRID ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    }
    @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }

    /* ── GAME CARD ── */
    .game-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    }
    .game-card:hover {
      box-shadow: 0 8px 32px rgba(61,139,55,0.10), 0 2px 8px rgba(0,0,0,0.06);
      transform: translateY(-2px);
      border-color: var(--accent-mid);
    }

    .game-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px 12px;
      border-bottom: 1.5px solid var(--border);
      background: var(--card-head);
    }
    .game-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 8px; object-fit: cover;
      border: 1.5px solid var(--border);
      background: var(--bg);
    }
    .game-icon-placeholder {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3); font-size: 1.1rem;
    }
    .game-title-wrap { flex: 1; min-width: 0; }
    .game-title {
      font-size: 1.1rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }
    .game-tag {
      display: inline-block; margin-top: 3px;
      font-size: 0.8rem; font-weight: 600;
      color: var(--accent); background: var(--accent-pale);
      border: 1.5px solid var(--accent-mid);
      padding: 1px 9px; border-radius: 99px;
    }

    .game-desc {
      padding: 12px 16px 14px;
      font-size: 0.97rem; line-height: 1.65;
      color: var(--text-2); flex: 1;
    }

    .game-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 12px 16px;
      background: var(--accent-pale);
      border-top: 1.5px solid var(--accent-mid);
      border-bottom: none; border-left: none; border-right: none;
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-size: 0.97rem; font-weight: 600;
      text-decoration: none; cursor: pointer;
      transition: background 0.14s, color 0.14s;
      width: 100%;
    }
    .game-btn:hover {
      background: var(--accent);
      color: #fff;
    }
    .game-btn svg { width: 13px; height: 13px; }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1 / -1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 56px 32px;
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }
    .empty-icon { font-size: 2rem; opacity: 0.3; }
    .empty-text { font-size: 1rem; font-weight: 600; color: var(--text-3); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .page-wrap { padding: 24px 16px 56px; }
    }
  </style>
</head>
<body>

<div class="page-wrap">

  <a class="back-link" href="https://hamptonix.com">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to hamptonix.com
  </a>

  <div class="page-header">
    <img src="https://i.postimg.cc/R0Pj0sp7/channels4-profile-removebg-preview-(2).png" alt="Hamptonix" class="page-header-logo" />
    <div class="page-header-text">
      <h1>Games</h1>
      <p>Browse and play Hamptonix's game catalog</p>
    </div>
  </div>

  <div class="controls-card">
    <div class="controls-head">
      <h2>Game Catalog</h2>
      <span class="count-badge" id="count">0 Games</span>
    </div>
    <div class="controls-body">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search" type="text" placeholder="Search games..." autocomplete="off" spellcheck="false" />
      </div>
      <div class="filters" id="filters"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
  const games = typeof GAMES !== "undefined" ? GAMES : [];

  if (!games.length) {
    document.getElementById("grid").innerHTML =
      '<div class="empty"><div class="empty-icon">◌</div><div class="empty-text">No games.js file found</div></div>';
  }

  const categories = ["All", ...new Set(games.map(g => g.category).filter(Boolean))];
  let activeFilter = "All";
  let query = "";

  const filtersEl = document.getElementById("filters");
  const gridEl    = document.getElementById("grid");
  const countEl   = document.getElementById("count");
  const searchEl  = document.getElementById("search");

  function renderFilters() {
    filtersEl.innerHTML = "";
    categories.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (c === activeFilter ? " active" : "");
      btn.textContent = c;
      btn.onclick = () => { activeFilter = c; renderFilters(); renderGrid(); };
      filtersEl.appendChild(btn);
    });
  }

  function buildIcon(g) {
    if (g.icon && g.icon.includes("simpleicons.org")) {
      return `<div class="game-icon-placeholder"><img src="${g.icon}" style="width:20px;height:20px;opacity:0.55;" /></div>`;
    }
    if (g.icon) {
      return `<img class="game-icon" src="${g.icon}" onerror="this.outerHTML='<div class=\\'game-icon-placeholder\\'>🎮</div>'" />`;
    }
    return `<div class="game-icon-placeholder">🎮</div>`;
  }

  function renderGrid() {
    const q = query.toLowerCase();
    const filtered = games.filter(g => {
      const matchSearch = !q ||
        (g.title  || "").toLowerCase().includes(q) ||
        (g.desc   || "").toLowerCase().includes(q) ||
        (g.tag    || "").toLowerCase().includes(q);
      const matchFilter = activeFilter === "All" || g.category === activeFilter;
      return matchSearch && matchFilter;
    });

    const n = filtered.length;
    countEl.textContent = n + (n === 1 ? " Game" : " Games");
    gridEl.innerHTML = "";

    if (!filtered.length) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.innerHTML = '<div class="empty-icon">◌</div><div class="empty-text">No games found</div>';
      gridEl.appendChild(empty);
      return;
    }

    filtered.forEach(g => {
      const card = document.createElement("div");
      card.className = "game-card";
      card.innerHTML = `
        <div class="game-header">
          ${buildIcon(g)}
          <div class="game-title-wrap">
            <div class="game-title">${g.title || "Untitled"}</div>
            ${g.tag ? `<span class="game-tag">${g.tag}</span>` : ""}
          </div>
        </div>
        <div class="game-desc">${g.desc || ""}</div>
        <a class="game-btn" href="${g.url || "#"}" target="_blank">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Play Now
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:auto;opacity:0.5;width:12px;height:12px"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      `;
      gridEl.appendChild(card);
    });
  }

  searchEl.addEventListener("input", e => { query = e.target.value; renderGrid(); });
  renderFilters();
  renderGrid();
</script>
</body>
</html>
