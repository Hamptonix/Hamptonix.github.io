<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamptonix | Mining Tycoon</title>
  <link
    rel="icon"
    type="image/png"
    href="https://i.postimg.cc/HnDd4JkX/channels4-profile-removebg-preview.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a2332,#2c3e50,#1a2332);min-height:100vh;color:#ecf0f1}
#root{display:grid;grid-template-columns:60% 40%;min-height:100vh;gap:0}
#leftCol{display:flex;flex-direction:column;align-items:center;padding:20px;position:relative;border-right:1px solid rgba(255,255,255,0.1)}
#rightCol{display:flex;flex-direction:column;height:100vh}
#topRight{flex:1;padding:12px;overflow-y:auto;border-bottom:1px solid rgba(255,255,255,0.15);min-height:0}
#bottomRight{height:50%;display:flex;flex-direction:column}
.coin-bar{background:rgba(0,0,0,0.4);border-radius:10px;padding:8px 16px;margin-bottom:14px;font-size:1.1rem;font-weight:600;letter-spacing:.5px;border:1px solid rgba(255,215,0,0.3);color:#ffd700;width:100%;text-align:center}
#clickBtn{width:140px;height:140px;background:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT2KnpT71djaTBPjBUpL6qGCUxsvOFMB9xNUg&s') no-repeat center;background-size:contain;border:none;cursor:pointer;animation:pulse 2s infinite;transition:transform .1s;margin:10px 0;flex-shrink:0}
#clickBtn:active{transform:scale(.93)!important;animation:none}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
#upgradeBtn{background:linear-gradient(135deg,#27ae60,#1e8449);color:#fff;border:none;padding:10px 22px;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;box-shadow:0 2px 8px rgba(39,174,96,.3);flex-shrink:0}
#upgradeBtn:hover{transform:translateY(-1px)}
.miner-container{display:flex;flex-wrap:wrap;justify-content:flex-start;gap:4px;padding:10px;background:rgba(0,0,0,0.3);border-radius:10px;border:1px solid rgba(255,255,255,0.1);width:100%;margin-top:10px;flex-shrink:0}
.miner-container img{width:38px;height:38px;object-fit:cover;border-radius:5px;border:1px solid rgba(255,255,255,0.2)}
.float-text{position:fixed;animation:floatUp 1.4s ease-out forwards;pointer-events:none;font-weight:700;z-index:9999}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-70px)}}
.ore-row{display:flex;align-items:center;justify-content:space-between;padding:4px 6px;border-radius:6px;margin:2px 0;background:rgba(0,0,0,0.2)}
.ore-name{font-size:.82rem;flex:1;min-width:70px}
.ore-count{font-size:.82rem;font-weight:600;width:50px;text-align:right;margin-right:8px}
.toggle-btn{font-size:.7rem;padding:2px 8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;border-radius:5px;cursor:pointer;transition:all .15s;white-space:nowrap}
.toggle-btn:hover{background:rgba(255,255,255,.2)}
.toggle-btn.hide-mode{background:rgba(231,76,60,.3);border-color:rgba(231,76,60,.5)}
.inv-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:6px;flex-wrap:wrap}
.inv-header h3{font-size:.95rem;font-weight:600;color:#ecf0f1}
.inv-header-btns{display:flex;gap:6px;align-items:center}
#sellBtn{background:linear-gradient(135deg,#c0392b,#922b21);color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s;white-space:nowrap}
#sellBtn:hover{transform:translateY(-1px)}
#toggleAllBtn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .2s;white-space:nowrap}
#toggleAllBtn:hover{background:rgba(255,255,255,.2)}
#toggleAllBtn.all-hidden{background:rgba(231,76,60,.25);border-color:rgba(231,76,60,.45)}
.tab-bar{display:flex;border-bottom:1px solid rgba(255,255,255,.15)}
.tab-btn{flex:1;padding:10px 6px;background:transparent;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;border-bottom:2px solid transparent}
.tab-btn.active{color:#fff;border-bottom:2px solid #3498db;background:rgba(52,152,219,.1)}
.tab-btn:hover:not(.active){color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.tab-content{display:none;padding:12px;overflow-y:auto;flex:1}
.tab-content.active{display:block}
.miner-card{background:rgba(0,0,0,.3);border-radius:8px;padding:10px;margin:6px 0;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.miner-card img{width:42px;height:42px;object-fit:cover;border-radius:6px}
.miner-info{flex:1}
.miner-info strong{font-size:.85rem;display:block}
.miner-info small{color:rgba(255,255,255,.6);font-size:.75rem}
.buy-btn{background:linear-gradient(135deg,#2980b9,#1a5276);color:#fff;border:none;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .2s;white-space:nowrap}
.buy-btn:hover{transform:translateY(-1px)}
.gamble-section{margin-bottom:12px;padding:10px;background:rgba(0,0,0,.25);border-radius:8px;border:1px solid rgba(255,255,255,.1)}
.gamble-section h4{font-size:.85rem;margin-bottom:8px;color:#bb8fce}
.gamble-input{width:100%;padding:6px 10px;margin-bottom:6px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:.82rem}
.gamble-input::placeholder{color:rgba(255,255,255,.4)}
.gamble-btn{background:linear-gradient(135deg,#8e44ad,#6c3483);color:#fff;border:none;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:.8rem;font-weight:600;width:100%;margin-top:4px;transition:all .2s}
.gamble-btn:hover{transform:translateY(-1px)}
.gamble-result{font-size:.8rem;margin-top:6px;padding:6px;background:rgba(0,0,0,.2);border-radius:5px;min-height:24px;color:#ecf0f1}
.settings-section{padding:10px 0}
.settings-section h4{font-size:.85rem;color:rgba(255,255,255,.7);margin-bottom:10px}
.settings-btn{display:block;width:100%;margin:6px 0;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:.83rem;font-weight:600;transition:all .2s;text-align:center}
.export-btn{background:linear-gradient(135deg,#2980b9,#1a5276);color:#fff}
.import-btn{background:linear-gradient(135deg,#27ae60,#1e8449);color:#fff}
.reset-btn{background:linear-gradient(135deg,#c0392b,#7b241c);color:#fff}
.settings-btn:hover{transform:translateY(-1px)}
.version-tag{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:16px;text-align:center}
#resetConfirm{display:none;margin-top:10px;padding:12px;background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.4);border-radius:8px}
#resetConfirm p{font-size:.8rem;color:#e74c3c;margin-bottom:8px;font-weight:600}
#resetConfirm input{width:100%;padding:6px 10px;background:rgba(0,0,0,.4);border:1px solid rgba(192,57,43,.5);border-radius:6px;color:#fff;font-size:.85rem;margin-bottom:8px;letter-spacing:2px;text-align:center}
#resetConfirm input::placeholder{color:rgba(255,255,255,.35);letter-spacing:0}
.reset-confirm-btns{display:flex;gap:6px}
.reset-confirm-btns button{flex:1;padding:6px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:.8rem}
#adminPanel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a2332;color:#ecf0f1;padding:20px;border-radius:12px;z-index:9999;box-shadow:0 0 30px rgba(0,0,0,.8);width:300px;border:1px solid rgba(255,255,255,.2)}
#adminPanel h3{margin-bottom:14px;font-size:1rem}
#adminPanel label{font-size:.82rem;display:block;margin-bottom:8px}
#adminPanel input,#adminPanel select{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.2);border-radius:5px;color:#fff;padding:4px 8px;width:100%}
.admin-btns{display:flex;gap:8px;margin-top:14px}
.admin-btns button{flex:1;padding:7px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:.82rem}
</style>

<div id="root">
<div id="leftCol">
  <div class="coin-bar" id="coinDisplay">⛏ Coins: 0</div>
  <button id="clickBtn" title="Click to mine!"></button>
  <button id="upgradeBtn" onclick="upgradePickaxe()">Upgrade Pickaxe (Lv 1) — 50 Coins</button>
  <div class="miner-container" id="minerContainer"></div>
</div>

<div id="rightCol">
  <div id="topRight">
    <div class="inv-header">
      <h3>🎒 Inventory</h3>
      <div class="inv-header-btns">
        <button id="toggleAllBtn" onclick="toggleAllFloatText()">Hide All</button>
        <button id="sellBtn" onclick="sellOres()">Sell All</button>
      </div>
    </div>
    <div id="oreInventory"></div>
  </div>

  <div id="bottomRight">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('shop',this)">🏪 Shop</button>
      <button class="tab-btn" onclick="switchTab('gamble',this)">🎲 Gambling</button>
      <button class="tab-btn" onclick="switchTab('settings',this)">⚙ Settings</button>
    </div>
    <div id="tab-shop" class="tab-content active"><div id="minerShop"></div></div>
    <div id="tab-gamble" class="tab-content">
      <div class="gamble-section">
        <h4>🪙 Coin Flip</h4>
        <input class="gamble-input" type="number" id="coinFlipBet" placeholder="Bet amount" />
        <button class="gamble-btn" onclick="flipCoin()">Flip Coin</button>
        <div class="gamble-result" id="coinFlipResult"></div>
      </div>
      <div class="gamble-section">
        <h4>🎲 Dice Roll (guess = 10× payout)</h4>
        <input class="gamble-input" type="number" id="diceBet" placeholder="Bet amount" />
        <input class="gamble-input" type="number" id="diceSide" placeholder="Pick 1–6" min="1" max="6" />
        <button class="gamble-btn" onclick="rollDice()">Roll Dice</button>
        <div class="gamble-result" id="diceResult"></div>
      </div>
    </div>
    <div id="tab-settings" class="tab-content">
      <div class="settings-section">
        <h4>Save / Load</h4>
        <button class="settings-btn export-btn" onclick="saveGameToFile()">⬇ Export Save (JSON)</button>
        <label style="display:block;width:100%;margin:6px 0">
          <span class="settings-btn import-btn" style="display:block;cursor:pointer">⬆ Import Save (JSON)</span>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="loadGameFromFile(event)" />
        </label>
      </div>
      <div class="settings-section">
        <h4>Danger Zone</h4>
        <button class="reset-btn settings-btn" onclick="showResetConfirm()">🗑 Reset Game</button>
        <div id="resetConfirm">
          <p id="resetPromptText"></p>
          <input type="text" id="resetCodeInput" placeholder="Type the code above" />
          <div class="reset-confirm-btns">
            <button style="background:#c0392b;color:#fff" onclick="doReset()">Confirm Reset</button>
            <button style="background:rgba(255,255,255,.15);color:#fff" onclick="hideResetConfirm()">Cancel</button>
          </div>
        </div>
      </div>
      <p class="version-tag">Mining Tycoon v2.0 | Ⓒ 2026 Hamptonix | support@hamptonix.com</p>
    </div>
  </div>
</div>
</div>

<div id="adminPanel">
  <h3>⚡ Admin Panel</h3>
  <label>Set Coins: <input id="adminCoins" type="number" /></label>
  <label style="margin-top:8px">Pickaxe Level: <input id="adminPickaxe" type="number" /></label>
  <label style="margin-top:8px">Add Miner:
    <select id="adminMinerType" style="margin-top:4px"></select>
    <input id="adminMinerAmount" type="number" min="1" value="1" placeholder="Amount" style="margin-top:4px" />
  </label>
  <div class="admin-btns">
    <button style="background:#27ae60;color:#fff" onclick="applyAdminChanges()">Apply</button>
    <button style="background:#c0392b;color:#fff" onclick="document.getElementById('adminPanel').style.display='none'">Close</button>
  </div>
</div>

<script>
let coins=0,pickaxeLevel=1,pickaxeCost=50,oreInventory={},floatTextEnabled={};
let resetCode="";
const minersOwned=[];

const ores=[
  {name:"Stone",value:1,chance:20,color:"#b0b0b0",size:"12px"},
  {name:"Coal",value:3,chance:20,color:"#888",size:"12px"},
  {name:"Copper",value:5,chance:15,color:"darkorange",size:"13px"},
  {name:"Iron",value:10,chance:15,color:"#ffcc99",size:"13px"},
  {name:"Gold",value:25,chance:10,color:"gold",size:"14px"},
  {name:"Platinum",value:50,chance:10,color:"silver",size:"14px"},
  {name:"Emerald",value:100,chance:5,color:"#2ecc71",size:"15px"},
  {name:"Diamond",value:250,chance:3,color:"#85c1e9",size:"15px"},
  {name:"Ruby",value:750,chance:1.1,color:"#e74c3c",size:"16px"},
  {name:"Titanium",value:1500,chance:0.7,color:"#aab7c4",size:"18px"},
  {name:"Tungsten",value:5000,chance:0.15,color:"#d5d8dc",size:"22px"},
  {name:"Hamptonite",value:25000,chance:0.05,color:"#a855f7",size:"26px"}
];

const minerTypes=[
  {name:"Basic Miner",rate:1,cost:50,image:"https://www.sptoolsusa.com/product-images/SP83213BU_1.jpg?resizeid=3&resizeh=600&resizew=600",chances:[40,30,20,8,2,0,0,0,0,0,0,0]},
  {name:"Decent Miner",rate:2,cost:500,image:"https://dm0qx8t0i9gc9.cloudfront.net/watermarks/image/rDtN98Qoishumwih/construction-worker-jackhammer-pneumatic-drill_MkJo08Iu_SB_PM.jpg",chances:[25,25,20,15,10,4,1,0,0,0,0,0]},
  {name:"Good Miner",rate:3,cost:2500,image:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8h19Hv0DGq1XeJKdiNwT8fqa3Zih2xismmQ&s",chances:[5,10,15,30,20,15,10,4,1,0,0,0]},
  {name:"Advanced Miner",rate:4,cost:10000,image:"https://geoprobe.com/sites/default/files/styles/large/public/articles/Kelly.jpg?itok=kJZluNio",chances:[5,10,15,25,20,15,6,3,1,0,0,0]},
  {name:"Superior Miner",rate:5,cost:150000,image:"https://img.amiami.com/images/product/main/124/TOY-RBT-2935.jpg",chances:[5,10,15,25,20,15,10,4,1,0,0,0]},
  {name:"Hamptonite Miner",rate:6,cost:2500000,image:"https://i.postimg.cc/s2MTPscQ/image0.jpg",chances:[0,0,0,0,0,0,0,0,0,50,25,25]}
];

const SUFFIXES=[
  [1e3,"K"],[1e6,"M"],[1e9,"B"],[1e12,"T"],
  [1e15,"Qu"],[1e18,"Qi"],[1e21,"Sx"],[1e24,"Sp"],
  [1e27,"Oc"],[1e30,"No"],[1e33,"De"],[1e36,"UDe"],
  [1e39,"DDe"],[1e42,"TDe"],[1e45,"QuDe"],[1e48,"QiDe"],
  [1e51,"SxDe"],[1e54,"SpDe"],[1e57,"OcDe"],[1e60,"NoDe"],
  [1e63,"Vi"],[1e66,"UVi"],[1e69,"DVi"],[1e72,"TVi"],
  [1e75,"QuVi"],[1e78,"QiVi"],[1e81,"SxVi"],[1e84,"SpVi"],
  [1e87,"OcVi"],[1e90,"NoVi"],[1e93,"Tg"],[1e96,"UTg"],
  [1e99,"DTg"],[1e100,"Ce"]
];

function fmt(v){
  if(v<1000)return Math.floor(v).toString();
  for(let i=SUFFIXES.length-1;i>=0;i--){
    if(v>=SUFFIXES[i][0]){
      const n=v/SUFFIXES[i][0];
      return(n>=100?Math.floor(n):n>=10?n.toFixed(1):n.toFixed(2))+SUFFIXES[i][1];
    }
  }
  return Math.floor(v).toString();
}

function getLeftColRect(){return document.getElementById('leftCol').getBoundingClientRect();}

function updateDisplay(){
  document.getElementById("coinDisplay").textContent=`⛏ Coins: ${fmt(coins)}`;
  const allHidden=ores.every(o=>floatTextEnabled[o.name]===false);
  const btn=document.getElementById("toggleAllBtn");
  btn.textContent=allHidden?"Show All":"Hide All";
  btn.classList.toggle("all-hidden",allHidden);
  const list=ores.map(ore=>{
    const amt=oreInventory[ore.name]||0;
    const enabled=floatTextEnabled[ore.name]!==false;
    return `<div class="ore-row">
      <span class="ore-name" style="color:${ore.color};font-size:${ore.size}">${ore.name}</span>
      <span class="ore-count" style="color:${ore.color}">${fmt(amt)}</span>
      <button class="toggle-btn${enabled?'':' hide-mode'}" onclick="toggleFloatText('${ore.name}')">${enabled?'Hide':'Show'}</button>
    </div>`;
  }).join('');
  document.getElementById("oreInventory").innerHTML=list;
  document.getElementById("upgradeBtn").textContent=`Upgrade Pickaxe (Lv ${pickaxeLevel}) — ${fmt(pickaxeCost)} Coins`;
}

function toggleFloatText(name){
  floatTextEnabled[name]=floatTextEnabled[name]===false;
  updateDisplay();
}

function toggleAllFloatText(){
  const allHidden=ores.every(o=>floatTextEnabled[o.name]===false);
  ores.forEach(o=>{floatTextEnabled[o.name]=allHidden?true:false;});
  updateDisplay();
}

function getRandomOre(chances){
  const src=chances||ores.map(o=>o.chance);
  let total=src.reduce((a,b)=>a+b,0),r=Math.random()*total;
  for(let i=0;i<src.length;i++){if(r<src[i])return ores[i];r-=src[i];}
  return ores[0];
}

function spawnFloatInLeftCol(ore){
  if(floatTextEnabled[ore.name]===false)return;
  const rect=getLeftColRect();
  const el=document.createElement("div");
  el.className="float-text";
  const pad=20;
  el.style.left=(rect.left+pad+Math.random()*(rect.width-pad*2))+"px";
  const yMin=rect.top+rect.height*0.25;
  const yMax=rect.top+rect.height*0.75;
  el.style.top=(yMin+Math.random()*(yMax-yMin))+"px";
  el.style.color=ore.color;
  el.style.fontSize=ore.size;
  el.textContent="+1 "+ore.name;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1400);
}

function mineOre(){
  for(let i=0;i<pickaxeLevel;i++){
    const ore=getRandomOre();
    oreInventory[ore.name]=(oreInventory[ore.name]||0)+1;
    spawnFloatInLeftCol(ore);
  }
  updateDisplay();
}

function upgradePickaxe(){
  if(coins>=pickaxeCost){coins-=pickaxeCost;pickaxeLevel++;pickaxeCost*=5;updateDisplay();}
}

function sellOres(){
  for(const[k,q]of Object.entries(oreInventory)){
    const ore=ores.find(o=>o.name===k);
    if(ore)coins+=q*ore.value;
  }
  oreInventory={};updateDisplay();
}

function buyMiner(i){
  const m=minerTypes[i];
  if(coins>=m.cost){
    coins-=m.cost;minersOwned.push(m);
    const img=document.createElement("img");
    img.src=m.image;img.alt=m.name;img.title=m.name;
    document.getElementById("minerContainer").appendChild(img);
    updateDisplay();
  }
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function flipCoin(){
  const bet=parseFloat(document.getElementById("coinFlipBet").value);
  const res=document.getElementById("coinFlipResult");
  if(isNaN(bet)||bet<=0||bet>coins){res.textContent="Invalid bet.";return;}
  if(Math.random()<0.5){coins+=bet;res.textContent=`✅ Won +${fmt(bet)} coins!`;}
  else{coins-=bet;res.textContent=`❌ Lost ${fmt(bet)} coins.`;}
  updateDisplay();
}

function rollDice(){
  const bet=parseFloat(document.getElementById("diceBet").value);
  const guess=parseInt(document.getElementById("diceSide").value);
  const res=document.getElementById("diceResult");
  if(isNaN(bet)||isNaN(guess)||bet<=0||bet>coins||guess<1||guess>6){res.textContent="Invalid bet or number.";return;}
  const roll=Math.floor(Math.random()*6)+1;
  if(roll===guess){const w=bet*10;coins+=w;res.textContent=`🎲 Rolled ${roll} — Won ${fmt(w)} coins!`;}
  else{coins-=bet;res.textContent=`🎲 Rolled ${roll} — Lost ${fmt(bet)} coins.`;}
  updateDisplay();
}

function showResetConfirm(){
  resetCode=Math.floor(100000+Math.random()*900000).toString();
  document.getElementById("resetPromptText").textContent=`Type this code to confirm: ${resetCode}`;
  document.getElementById("resetCodeInput").value="";
  document.getElementById("resetConfirm").style.display="block";
}

function hideResetConfirm(){
  document.getElementById("resetConfirm").style.display="none";
  document.getElementById("resetCodeInput").value="";
}

function doReset(){
  const input=document.getElementById("resetCodeInput").value.trim();
  if(input===resetCode){
    localStorage.removeItem("mineTycoonSave");
    coins=0;pickaxeLevel=1;pickaxeCost=50;oreInventory={};floatTextEnabled={};
    minersOwned.length=0;
    document.getElementById("minerContainer").innerHTML="";
    hideResetConfirm();
    updateDisplay();
  } else {
    document.getElementById("resetCodeInput").style.border="1px solid #e74c3c";
    setTimeout(()=>document.getElementById("resetCodeInput").style.border="",800);
  }
}

function renderShop(){
  document.getElementById("minerShop").innerHTML=minerTypes.map((m,i)=>`
    <div class="miner-card">
      <img src="${m.image}" alt="${m.name}" />
      <div class="miner-info"><strong>${m.name}</strong><small>${m.rate} ore/sec</small></div>
      <button class="buy-btn" onclick="buyMiner(${i})">Buy<br>${fmt(m.cost)}c</button>
    </div>`).join('');
}

function saveGameToFile(){
  const d={coins,pickaxeLevel,pickaxeCost,oreInventory,floatTextEnabled,minersOwned:minersOwned.map(m=>m.name)};
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:"application/json"}));
  a.download="mine_tycoon_save.json";a.click();
}

function loadGameFromFile(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{applyState(JSON.parse(ev.target.result));}catch(err){alert("Invalid save file.");}};
  r.readAsText(f);
}

function applyState(d){
  coins=d.coins??0;pickaxeLevel=d.pickaxeLevel??1;pickaxeCost=d.pickaxeCost??50;
  oreInventory=d.oreInventory??{};floatTextEnabled=d.floatTextEnabled??{};
  minersOwned.length=0;
  document.getElementById("minerContainer").innerHTML="";
  (d.minersOwned||[]).forEach(name=>{
    const m=minerTypes.find(x=>x.name===name);
    if(m){minersOwned.push(m);const img=document.createElement("img");img.src=m.image;img.alt=m.name;img.title=m.name;document.getElementById("minerContainer").appendChild(img);}
  });
  updateDisplay();
}

function saveGame(){
  const d={coins,pickaxeLevel,pickaxeCost,oreInventory,floatTextEnabled,minersOwned:minersOwned.map(m=>m.name)};
  localStorage.setItem("mineTycoonSave",JSON.stringify(d));
}

function loadGame(){
  const s=localStorage.getItem("mineTycoonSave");
  if(s)try{applyState(JSON.parse(s));}catch(e){}
}

let adminInput="",adminActive=false;
document.addEventListener("keydown",e=>{
  if(e.shiftKey&&e.key.toLowerCase()==="m"){adminActive=true;adminInput="";}
  else if(adminActive&&/^[a-zA-Z0-9]$/.test(e.key)){
    adminInput+=e.key;
    if(adminInput==="admin")showAdminPanel();
    else if(!"admin".startsWith(adminInput))adminActive=false;
  }
  if(e.key===' '){e.preventDefault();sellOres();}
});

function showAdminPanel(){
  document.getElementById("adminCoins").value=coins;
  document.getElementById("adminPickaxe").value=pickaxeLevel;
  const sel=document.getElementById("adminMinerType");sel.innerHTML="";
  minerTypes.forEach((m,i)=>{const o=document.createElement("option");o.value=i;o.textContent=m.name;sel.appendChild(o);});
  document.getElementById("adminPanel").style.display="block";adminActive=false;
}

function applyAdminChanges(){
  coins=parseInt(document.getElementById("adminCoins").value)||coins;
  pickaxeLevel=parseInt(document.getElementById("adminPickaxe").value)||pickaxeLevel;
  const ti=parseInt(document.getElementById("adminMinerType").value);
  const amt=parseInt(document.getElementById("adminMinerAmount").value)||0;
  for(let i=0;i<amt;i++){
    minersOwned.push(minerTypes[ti]);
    const img=document.createElement("img");img.src=minerTypes[ti].image;img.alt=minerTypes[ti].name;
    document.getElementById("minerContainer").appendChild(img);
  }
  document.getElementById("adminPanel").style.display="none";
  updateDisplay();
}

document.getElementById("clickBtn").addEventListener("click",mineOre);
document.querySelector('span.import-btn').addEventListener('click',()=>document.getElementById('importFile').click());

setInterval(()=>{
  minersOwned.forEach(m=>{
    for(let i=0;i<m.rate;i++){
      const ore=getRandomOre(m.chances);
      oreInventory[ore.name]=(oreInventory[ore.name]||0)+1;
      spawnFloatInLeftCol(ore);
    }
  });
  updateDisplay();
},1000);

setInterval(saveGame,5000);
renderShop();
loadGame();
updateDisplay();
</script>
