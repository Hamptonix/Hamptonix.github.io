<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/assets/outhouse.png" />
  <title>Hamptonix | OutHouse</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ================= THEME VARIABLES ================= */
    :root {
      --bg: #05070f;
      --cardTop: rgba(30, 36, 60, 0.55);
      --cardBot: rgba(18, 22, 40, 0.55);
      --stroke: rgba(255,255,255,0.15);
      --title: rgba(255,255,255,0.96);
      --text: rgba(255,255,255,0.85);
      --muted: rgba(255,255,255,0.65);
      --violet: #7a7cff;
      --teal: #3cf3ff;
      --radius: 18px;
      --shadow: 0 25px 80px rgba(0,0,0,0.65);
    }

    /* ================= BASE ================= */
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      background:
        radial-gradient(800px 500px at 15% 10%, rgba(122,124,255,.25), transparent 60%),
        radial-gradient(700px 400px at 90% 20%, rgba(60,243,255,.18), transparent 60%),
        linear-gradient(180deg, #05070f, #0b1022);
      color: var(--text);
    }

    /* ================= NAVBAR ================= */
    .navbar {
      width: 100%;
      max-width: 1200px;
      margin: 15px;
      background: linear-gradient(180deg, var(--cardTop), var(--cardBot));
      border: 1px solid var(--stroke);
      backdrop-filter: blur(18px) saturate(140%);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      flex-wrap: wrap;
    }

    .navbar .logo {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    .navbar .button, .navbar a.button {
      flex: 1;
      min-width: 80px;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.05);
      color: white;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      text-decoration: none;
    }

    .navbar .button:hover, .navbar a.button:hover {
      transform: translateY(-2px) scale(1.03);
      border-color: var(--violet);
    }

    .navbar .button.active, .navbar a.button.active {
      border-color: var(--violet);
    }

    /* ================= PROJECT CARDS ================= */
    .project-card {
      width: 100%;
      max-width: 500px;
      background: linear-gradient(180deg, var(--cardTop), var(--cardBot));
      border: 1px solid var(--stroke);
      backdrop-filter: blur(18px) saturate(140%);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hampimage {
      width: 80px;
      height: 80px;
      border-radius: 12px;
    }

    h1.title {
      font-family: 'Poppins', sans-serif;
      color: var(--title);
      margin: 0;
      text-shadow: 0 0 12px rgba(122,124,255,0.35);
      font-size: 22px;
    }

    p.description {
      font-family: 'Poppins', sans-serif;
      color: var(--muted);
      text-align: center;
      margin: 0;
      line-height: 1.5;
    }

    .thebuttons {
      display: flex;
      gap: 10px;
      width: 100%;
      flex-wrap: wrap;
    }

    .contactbutton {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.05);
      color: white;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .contactbutton:hover {
      transform: translateY(-2px) scale(1.02);
      border-color: var(--violet);
    }

    .button-icon {
      width: 20px;
      height: 20px;
    }

    @media (max-width: 600px) {
      .project-card { padding: 20px; }
      .top-row { flex-direction: column; gap: 10px; }
      h1.title { font-size: 20px; }
      .hampimage { width: 60px; height: 60px; }
      .contactbutton { font-size: 14px; padding: 10px; }
    }
  </style>
</head>
<body>

  <!-- Navbar container -->
  <div id="navbar-container"></div>

  <!-- Bathroom location system -->
  <div class="project-card">
    <div class="top-row">
      <img class="hampimage" src="/assets/outhouse.png" alt="icon" />
      <h1 class="title">OutHouse</h1>
    </div>
    <p class="description">Select your bathroom location to let others know where you are. You will be automatically removed after 10 minutes.</p>
    <div class="thebuttons" id="location-buttons"></div>
    <div id="bathroom-status" style="margin-top:20px; width:100%; max-width:500px; overflow-y:auto; max-height:300px; padding:10px; border:1px solid var(--stroke); border-radius:var(--radius); background:linear-gradient(180deg, var(--cardTop), var(--cardBot));"></div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script>
    // Your existing Firebase config (update with your actual config)
    const firebaseConfig = {
      apiKey: "AIzaSyDgqKucX0Hs66nfEA4wXWOD1mM5ssPx4Js",
      authDomain: "outhouse-hamptonix.firebaseapp.com",
      projectId: "outhouse-hamptonix",
      storageBucket: "outhouse-hamptonix.firebasestorage.app",
      messagingSenderId: "23392249157",
      appId: "1:23392249157:web:1042a8a874dbfd4b3d0a2c",
      measurementId: "G-GD3LZZYSLV"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Define locations
    const locations = [
      { id: 'A_Building_Left', label: 'A Building Left' },
      { id: 'A_Building_Right', label: 'A Building Right' },
      { id: 'G_Building', label: 'G Building' }
    ];

    const locationButtonsContainer = document.getElementById('location-buttons');
    const bathroomStatusDiv = document.getElementById('bathroom-status');

    let currentUserRef = null; // track current user ref

    // Generate buttons
    locations.forEach(loc => {
      const btn = document.createElement('button');
      btn.className = 'button';
      btn.textContent = loc.label;
      btn.onclick = () => {
        const name = prompt("Enter your name:");
        if (!name) return;

        // Remove previous user if exists
        if (currentUserRef) {
          currentUserRef.remove();
        }

        // Push new user
        currentUserRef = firebase.database().ref(`bathrooms/${loc.id}/users`).push();
        currentUserRef.set(name);

        // Set timer to remove after 10 mins
        setTimeout(() => {
          if (currentUserRef) {
            currentUserRef.remove();
            if (currentUserRef === currentUserRef) {
              currentUserRef = null;
            }
          }
        }, 600000);
      };
      locationButtonsContainer.appendChild(btn);
    });

    // Function to listen and update display
    function listenToBathrooms() {
      locations.forEach(loc => {
        firebase.database().ref(`bathrooms/${loc.id}/users`).off();
      });
      locations.forEach(loc => {
        firebase.database().ref(`bathrooms/${loc.id}/users`).on('value', snapshot => {
          const usersObj = snapshot.val() || {};
          const users = Object.values(usersObj);
          const header = `<h3 style="margin-top:10px;">${loc.label}</h3>`;
          const userList = users.length ? users.join(', ') : '<em>No one here</em>';

          const sectionId = `section-${loc.id}`;
          let sectionDiv = document.getElementById(sectionId);
          if (!sectionDiv) {
            sectionDiv = document.createElement('div');
            sectionDiv.id = sectionId;
            sectionDiv.innerHTML = header + `<p>${userList}</p>`;
            bathroomStatusDiv.appendChild(sectionDiv);
          } else {
            sectionDiv.innerHTML = header + `<p>${userList}</p>`;
          }
        });
      });
    }

    // Start listening
    listenToBathrooms();
  </script>

</body>
</html>
