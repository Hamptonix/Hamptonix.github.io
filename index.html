
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hamptonix</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f0f0f0;
      --gray: #141414;
      --border: #242424;
      --accent: #7ecfea;
      --accent-dim: #4aafcc;
      --accent-glow: rgba(126, 207, 234, 0.15);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(126,207,234,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(126,207,234,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    .scene {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
      animation: fadeDown 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4.5vw, 3.4rem);
      letter-spacing: 0.22em;
      color: var(--white);
      text-shadow: 0 0 40px rgba(126,207,234,0.2);
    }
    .header-line {
      width: 50px; height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 7px auto 0;
    }

    .cards {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      justify-content: center;
      animation: fadeUp 0.65s cubic-bezier(0.22,1,0.36,1) 0.08s both;
    }

    .card {
      background: var(--gray);
      border: 1px solid var(--border);
      border-radius: 3px;
      width: clamp(190px, 20vw, 265px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(126,207,234,0.06),
        0 12px 40px rgba(0,0,0,0.7);
      transition: box-shadow 0.3s, transform 0.3s;
    }
    .card:hover {
      box-shadow:
        0 0 0 1px rgba(126,207,234,0.2),
        0 12px 50px rgba(0,0,0,0.75),
        0 0 24px var(--accent-glow);
      transform: translateY(-2px);
    }

    .card-top {
      padding: 16px 14px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
    }
    .card-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      align-self: flex-start;
      opacity: 0.8;
    }
    .avatar {
      width: 68px; height: 68px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      object-fit: cover;
      box-shadow: 0 0 20px rgba(126,207,234,0.25);
    }
    .avatar-placeholder {
      width: 68px; height: 68px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
    }
    .name-tag {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      letter-spacing: 0.16em;
      color: var(--white);
    }

    .btn-list {
      display: flex;
      flex-direction: column;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 14px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: rgba(240,240,240,0.75);
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, padding-left 0.2s;
      text-transform: uppercase;
    }
    .social-btn:last-child { border-bottom: none; }
    .social-btn:hover {
      background: rgba(126,207,234,0.07);
      color: var(--accent);
      padding-left: 20px;
    }
    .social-btn img {
      width: 14px; height: 14px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 0.55;
      flex-shrink: 0;
      transition: opacity 0.15s, filter 0.15s;
    }
    .social-btn:hover img {
      filter: brightness(0) saturate(100%) invert(78%) sepia(50%) saturate(400%) hue-rotate(160deg);
      opacity: 1;
    }
    .social-arrow {
      margin-left: auto;
      color: var(--accent);
      opacity: 0;
      font-size: 0.65rem;
      transition: opacity 0.15s;
    }
    .social-btn:hover .social-arrow { opacity: 1; }

    .old-btn-wrap {
      padding: 16px 14px;
    }
    .old-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 14px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 2px;
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .old-btn:hover {
      background: var(--accent);
      color: var(--black);
      box-shadow: 0 0 20px rgba(126,207,234,0.35);
    }

    /* Corner accents */
    .corner { position: fixed; width: 26px; height: 26px; }
    .corner.tl { top:14px; left:14px; border-top:1px solid rgba(126,207,234,0.4); border-left:1px solid rgba(126,207,234,0.4); }
    .corner.tr { top:14px; right:14px; border-top:1px solid rgba(126,207,234,0.4); border-right:1px solid rgba(126,207,234,0.4); }
    .corner.bl { bottom:14px; left:14px; border-bottom:1px solid rgba(126,207,234,0.4); border-left:1px solid rgba(126,207,234,0.4); }
    .corner.br { bottom:14px; right:14px; border-bottom:1px solid rgba(126,207,234,0.4); border-right:1px solid rgba(126,207,234,0.4); }

    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-14px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="scene">

    <div class="header">
      <h1>hamptonix</h1>
      <div class="header-line"></div>
    </div>

    <div class="cards">

      <!-- ── Profile Card ── -->
      <div class="card">
        <div class="card-top">
          <span class="card-label">Profile</span>
          <img
            class="avatar"
            src="https://i.postimg.cc/R0Pj0sp7/channels4-profile-removebg-preview-(2).png"
            alt="hamptonix"
          />
          <span class="name-tag">hamptonix</span>
        </div>

        <div class="btn-list">

          <a class="social-btn" href="https://youtube.com/@hamptonix" target="_blank">
            <img src="https://cdn.simpleicons.org/youtube/ffffff" alt="" />
            YouTube
            <span class="social-arrow">→</span>
          </a>

          <a class="social-btn" href="https://instagram.com/eliahamp" target="_blank">
            <img src="https://cdn.simpleicons.org/instagram/ffffff" alt="" />
            Instagram
            <span class="social-arrow">→</span>
          </a>

          <a class="social-btn" href="https://discord.gg/862493254272286730" target="_blank">
            <img src="https://cdn.simpleicons.org/discord/ffffff" alt="" />
            Discord
            <span class="social-arrow">→</span>
          </a>

          <a class="social-btn" href="https://github.com/hamptonix" target="_blank">
            <img src="https://cdn.simpleicons.org/github/ffffff" alt="" />
            GitHub
            <span class="social-arrow">→</span>
          </a>

          <a class="social-btn" href="https://steamcommunity.com/id/hamptonix" target="_blank">
            <img src="https://cdn.simpleicons.org/steam/ffffff" alt="" />
            Steam
            <span class="social-arrow">→</span>
          </a>

          <a class="social-btn" href="https://roblox.com/users/1806308043/profile" target="_blank">
            <img src="https://cdn.simpleicons.org/roblox/ffffff" alt="" />
            Roblox
            <span class="social-arrow">→</span>
          </a>

          <a class="social-btn" href="https://namemc.com/profile/hamptonix" target="_blank">
            <img src="/assets/namemctrans.png" alt="" />
            NameMC
            <span class="social-arrow">→</span>
          </a>

        </div>
      </div>

      <!-- ── Old Website Card ── -->
      <div class="card">
        <div class="card-top">
          <span class="card-label">Archive</span>
          <div class="avatar-placeholder">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#4aafcc" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <path d="M8 21h8M12 17v4"/>
            </svg>
          </div>
          <span class="name-tag">Games Page</span>
        </div>

        <div class="old-btn-wrap">
          <a class="old-btn" href="https://hamptonix.com/games" target="_blank">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            Visit Games Page
          </a>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
